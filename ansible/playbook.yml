---
# Step 1: Bootstrap all nodes (Common pre-requisites for Master & Workers)
- name: Prepare all nodes for Kubernetes
  hosts: k8s_cluster
  become: true
  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install prerequisite packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
        state: present

    - name: Disable Swap (Required by Kubernetes)
      command: swapoff -a
      changed_when: false

    - name: Remove swap entry from /etc/fstab permanently
      replace:
        path: /etc/fstab
        regexp: '^([^#].*swap.*)$'
        replace: '# \1'

    - name: Load kernel modules required for containerd
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Load overlay and br_netfilter modules immediately
      shell: |
        modprobe overlay
        modprobe br_netfilter

    - name: Set sysctl parameters for Kubernetes networking
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: Apply sysctl params without reboot
      command: sysctl --system

    - name: Install containerd container runtime
      apt:
        name: containerd
        state: present

    - name: Generate default containerd configuration directory
      file:
        path: /etc/containerd
        state: directory

    - name: Configure containerd to use SystemdCgroup
      shell: containerd config default | sed 's/SystemdCgroup = false/SystemdCgroup = true/g' > /etc/containerd/config.toml
      notify: Restart containerd

    - name: Ensure Kubernetes APT repository signing key directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Kubernetes signing key
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: '0644'

    - name: Add Kubernetes APT repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
        state: present
        filename: kubernetes

    - name: Install Kubernetes components (kubelet, kubeadm, kubectl)
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Hold Kubernetes packages from automatic upgrades
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: [kubelet, kubeadm, kubectl]

  handlers:
    - name: Restart containerd
      service:
        name: containerd
        state: restarted
        enabled: yes

# Step 2: Control Plane Setup (Master Node only)
- name: Initialize Kubernetes Master Node
  hosts: master
  become: true
  tasks:
    - name: Initialize the cluster with kubeadm
      command: kubeadm init --pod-network-cidr=10.32.0.0/12
      register: kubeadm_init
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Setup kubeconfig directory for the ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy admin.conf to user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    - name: Deploy Weave Net Pod Network Plugin
      become: false
      command: kubectl apply -f https://github.com/weaveworks/weave/releases/download/v2.8.1/weave-daemonset-k8s.yaml
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: Generate worker node join command token
      command: kubeadm token create --print-join-command
      register: join_command_raw

    - name: Set join command as a global cluster fact
      set_fact:
        join_command: "{{ join_command_raw.stdout }}"

# Step 3: Worker Node Expansion (Workers only)
- name: Join Worker Nodes to Cluster
  hosts: workers
  become: true
  tasks:
    - name: Join worker to the Kubernetes cluster
      command: "{{ hostvars[groups['master'][0]]['join_command'] }}"
      args:
        creates: /etc/kubernetes/kubelet.conf
